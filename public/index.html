<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG AdminPanel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:      #07080f;
    --bg2:     #0c0d18;
    --bg3:     #10111e;
    --surf:    #141627;
    --surf2:   #191c30;
    --border:  #232640;
    --border2: #2e3255;
    --p1:      #6366f1;
    --p2:      #22d3ee;
    --grad:    linear-gradient(135deg,#6366f1,#22d3ee);
    --green:   #10b981;
    --red:     #f43f5e;
    --yellow:  #f59e0b;
    --t1: #e8eaf2; --t2: #7c82a0; --t3: #3e4460;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
    --tx: 0.18s cubic-bezier(.4,0,.2,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  .app{display:flex;min-height:100vh}

  /* sidebar */
  .sidebar{width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
  .sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
  .logo-mark{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:var(--grad);font-size:18px;margin-bottom:10px}
  .logo-text{font-family:var(--mono);font-size:13px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1.5px;text-transform:uppercase}
  .logo-sub{font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--mono)}
  .nav{flex:1;padding:10px 8px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:400;color:var(--t2);transition:all var(--tx);margin-bottom:2px;user-select:none;position:relative;border:1px solid transparent}
  .nav-item:hover{background:var(--surf);color:var(--t1)}
  .nav-item.active{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(34,211,238,.06));color:var(--t1);border-color:rgba(99,102,241,.22)}
  .nav-item.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;border-radius:2px;background:var(--grad)}
  .nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
  .sidebar-footer{padding:14px 16px;border-top:1px solid var(--border)}
  .sidebar-info{font-size:11px;color:var(--t3);margin-bottom:10px;line-height:1.7}
  .main{margin-left:224px;flex:1;padding:28px;max-width:calc(100vw - 224px)}

  /* page header */
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:12px}
  .page-title{font-size:20px;font-weight:600;letter-spacing:-.3px}
  .page-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .page-subtitle{font-size:12px;color:var(--t3);font-family:var(--mono);margin-top:2px}

  /* cards */
  .card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:20px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
  .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}}

  /* stat cards */
  .stat-card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color var(--tx),transform var(--tx)}
  .stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
  .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);opacity:0;transition:opacity var(--tx)}
  .stat-card:hover::after{opacity:1}
  .stat-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:500}
  .stat-value{font-size:30px;font-weight:700;font-family:var(--mono);letter-spacing:-1px}
  .stat-value.g{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat-value.green{color:var(--green)}.stat-value.yellow{color:var(--yellow)}.stat-value.red{color:var(--red)}

  /* table */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:10px 14px;color:var(--t3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr{transition:background var(--tx)}
  tbody tr:hover td{background:rgba(99,102,241,.04)}
  tbody tr:hover td:first-child{border-left:2px solid var(--p1);padding-left:12px}

  /* badges */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;font-family:var(--mono);white-space:nowrap}
  .badge-green{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
  .badge-red{background:rgba(244,63,94,.12);color:var(--red);border:1px solid rgba(244,63,94,.2)}
  .badge-yellow{background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
  .badge-cyan{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(34,211,238,.08));color:var(--p2);border:1px solid rgba(34,211,238,.2)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
  .dot-pulse{animation:pulse-dot 2s infinite}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all var(--tx);font-family:var(--sans);white-space:nowrap}
  .btn-primary{background:var(--grad);color:#fff;box-shadow:0 0 24px rgba(99,102,241,.22)}
  .btn-primary:hover{opacity:.86;transform:translateY(-1px);box-shadow:0 0 36px rgba(99,102,241,.35)}
  .btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border2)}
  .btn-ghost:hover{background:var(--surf2);color:var(--t1)}
  .btn-danger{background:transparent;color:var(--red);border:1px solid rgba(244,63,94,.25)}
  .btn-danger:hover{background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.45)}
  .btn-sm{padding:5px 11px;font-size:12px;border-radius:7px}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
  .btn-icon{padding:6px;width:30px;height:30px;justify-content:center}

  /* inputs */
  .form-group{margin-bottom:16px}
  .form-label{display:block;font-size:12px;color:var(--t2);margin-bottom:6px;font-weight:500;letter-spacing:.2px}
  .form-input{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;color:var(--t1);font-size:13px;font-family:var(--sans);outline:none;transition:border-color var(--tx),box-shadow var(--tx)}
  .form-input:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
  .form-input::placeholder{color:var(--t3)}
  .form-radio-group{display:flex;gap:8px}
  .form-radio-btn{flex:1;padding:8px;border-radius:8px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--t2);background:var(--bg3);transition:all var(--tx)}
  .form-radio-btn.active{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(34,211,238,.08));color:var(--t1);border-color:rgba(99,102,241,.35)}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fade-in .15s ease}
  @keyframes fade-in{from{opacity:0}to{opacity:1}}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:modal-in .2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 24px 80px rgba(0,0,0,.5)}
  @keyframes modal-in{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:none}}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px;padding-bottom:16px;border-bottom:1px solid var(--border)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

  /* link box */
  .link-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-family:var(--mono);font-size:11px;color:var(--p2);cursor:pointer;transition:border-color var(--tx),background var(--tx);max-width:300px;overflow:hidden}
  .link-box:hover{border-color:var(--p1);background:var(--surf)}
  .link-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

  /* node card */
  .node-card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color var(--tx),transform var(--tx),box-shadow var(--tx);position:relative;overflow:hidden}
  .node-card::before{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(34,211,238,.03));opacity:0;transition:opacity var(--tx)}
  .node-card:hover{border-color:rgba(99,102,241,.35);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.25)}
  .node-card:hover::before{opacity:1}
  .node-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;position:relative}
  .node-name{font-size:15px;font-weight:600}
  .node-host{font-size:11px;color:var(--t3);font-family:var(--mono);margin-top:3px}
  .node-stats{display:flex;gap:24px;margin:14px 0}
  .node-stat-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .node-stat-value{font-size:22px;font-weight:700;font-family:var(--mono);background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .node-actions{display:flex;gap:8px;margin-top:14px;position:relative;flex-wrap:wrap}

  /* toast */
  .toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{background:var(--surf2);border:1px solid var(--border2);border-radius:11px;padding:12px 16px;font-size:13px;min-width:220px;max-width:320px;animation:toast-in .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.4)}
  .toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--p1)}
  @keyframes toast-in{from{transform:translateX(32px) scale(.95);opacity:0}to{transform:none;opacity:1}}

  /* misc */
  .empty{text-align:center;padding:48px 24px;color:var(--t3)}
  .empty-icon{font-size:40px;margin-bottom:12px;opacity:.6}
  .empty-text{font-size:14px}
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.12);border-top-color:var(--p2);border-radius:50%;animation:spin .55s linear infinite;display:inline-block;flex-shrink:0}
  .spinner-sm{width:13px;height:13px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-row{text-align:center;padding:40px;color:var(--t2);font-size:13px;display:flex;align-items:center;justify-content:center;gap:10px}
  .refreshing-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);font-weight:500;animation:fade-pulse 1.5s ease infinite}
  @keyframes fade-pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .actions-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .section-title{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin:20px 0 14px;display:flex;align-items:center;gap:10px}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .page-enter{animation:page-in .2s ease}
  @keyframes page-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .tx-rx{font-family:var(--mono);font-size:11px;white-space:nowrap}
  .tx-rx .rx{color:#34d399}.tx-rx .tx{color:#f87171}

  /* mobile */
  @media(max-width:768px){
    .sidebar{display:none}.main{margin-left:0;max-width:100vw;padding:16px 12px 76px}
    .mobile-nav{display:flex!important}
    .grid-4{grid-template-columns:repeat(2,1fr);gap:10px}.grid-2{grid-template-columns:1fr}
    .page-header{flex-wrap:wrap;gap:8px;margin-bottom:18px}
    .page-header>div:last-child{width:100%;display:flex;justify-content:flex-end;flex-wrap:wrap;gap:6px}
    .stat-value{font-size:24px}.card{padding:14px}
    .modal{border-radius:20px 20px 0 0!important;position:fixed!important;bottom:0!important;left:0!important;right:0!important;max-width:100%!important;max-height:88vh!important;margin:0!important}
    .modal-overlay{align-items:flex-end!important}
    table{font-size:12px} th,td{padding:8px 10px}
    .link-box{max-width:150px}.actions-row{gap:3px}.node-card{padding:14px}
  }
  .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:62px;background:var(--bg2);border-top:1px solid var(--border);z-index:200;align-items:stretch}
  .mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-size:10px;color:var(--t3);transition:color var(--tx);user-select:none;-webkit-tap-highlight-color:transparent}
  .mobile-nav-item.active{color:var(--p1)}
  .mnav-icon{font-size:20px;line-height:1}.mnav-label{font-size:10px;font-weight:500}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const getToken = () => localStorage.getItem('mtg_token') || '';
const setToken = (t) => localStorage.setItem('mtg_token', t);
const getTotpCode = () => sessionStorage.getItem('mtg_totp') || '';
const setTotpCode = (c) => { if (c) sessionStorage.setItem('mtg_totp', c); else sessionStorage.removeItem('mtg_totp'); };

// API with GET deduplication
const _pending = {};
const api = async (method, path, body) => {
  const key = `${method}:${path}`;
  if (method === 'GET' && _pending[key]) return _pending[key];
  const headers = { 'Content-Type': 'application/json', 'x-auth-token': getToken() };
  const totp = getTotpCode();
  if (totp) headers['x-totp-code'] = totp;
  const req = fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined })
    .then(async r => {
      delete _pending[key];
      if (r.status === 401) { setToken(''); throw new Error('Unauthorized'); }
      if (r.status === 403) {
        const d = await r.json().catch(() => ({}));
        if (d.totp) throw new Error('TOTP_REQUIRED');
        throw new Error(d.error || 'Forbidden');
      }
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'API error');
      return data;
    }).catch(e => { delete _pending[key]; throw e; });
  if (method === 'GET') _pending[key] = req;
  return req;
};

let toastCb = null;
function useToast() {
  const [toasts, setToasts] = useState([]);
  toastCb = (msg, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  };
  return toasts;
}
const toast = (msg, type) => toastCb && toastCb(msg, type);
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Скопировано!', 'success'));
}

function Login({ onLogin }) {
  const [token_, setToken_] = useState('');
  const [step, setStep] = useState('token');
  const [totpInput, setTotpInput] = useState('');
  const [loading, setLoading] = useState(false);

  const submitToken = async (e) => {
    e.preventDefault();
    if (!token_.trim()) return;
    setLoading(true);
    try {
      setToken(token_);
      const status = await fetch('/api/totp/status', { headers: { 'x-auth-token': token_ } }).then(r => r.json());
      if (status.enabled) { setStep('totp'); }
      else { await api('GET', '/api/nodes'); toast('Подключено!', 'success'); onLogin(token_); }
    } catch { setToken(''); toast('Неверный токен', 'error'); }
    finally { setLoading(false); }
  };

  const submitTotp = async (e) => {
    e.preventDefault();
    if (totpInput.length !== 6) return;
    setLoading(true);
    try {
      setTotpCode(totpInput);
      await api('GET', '/api/nodes');
      toast('Подключено!', 'success'); onLogin(token_);
    } catch { setTotpCode(''); setTotpInput(''); toast('Неверный код 2FA', 'error'); }
    finally { setLoading(false); }
  };

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:16,
      backgroundImage:'radial-gradient(ellipse 60% 50% at 50% 0%,rgba(99,102,241,.08) 0%,transparent 70%)'}}>
      <div className="modal" style={{maxWidth:380,position:'static',borderRadius:20,maxHeight:'none',padding:32}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',
            width:56,height:56,borderRadius:16,background:'var(--grad)',fontSize:26,marginBottom:14}}>
            {step==='totp'?'🔐':'⚡'}
          </div>
          <div style={{fontFamily:'var(--mono)',fontSize:20,fontWeight:700,
            background:'var(--grad)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'-.5px'}}>
            MTG Panel
          </div>
          <div style={{fontSize:12,color:'var(--t3)',marginTop:5}}>
            {step==='totp'?'Двухфакторная аутентификация':'MTG Proxy Manager'}
          </div>
        </div>
        {step==='token' ? (
          <form onSubmit={submitToken}>
            <div className="form-group">
              <label className="form-label">Auth Token</label>
              <input className="form-input" type="password" placeholder="Введи токен..." value={token_}
                onChange={e=>setToken_(e.target.value)} autoFocus />
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:11}} type="submit" disabled={loading}>
              {loading?<span className="spinner spinner-sm"/>:'Войти →'}
            </button>
          </form>
        ) : (
          <form onSubmit={submitTotp}>
            <div style={{fontSize:12,color:'var(--t2)',marginBottom:18,textAlign:'center',lineHeight:1.6}}>
              Введи код из Google Authenticator
            </div>
            <div className="form-group">
              <label className="form-label" style={{textAlign:'center',display:'block'}}>6-значный код</label>
              <input className="form-input" type="text" inputMode="numeric" pattern="[0-9]*"
                placeholder="000000" value={totpInput} maxLength={6}
                onChange={e=>setTotpInput(e.target.value.replace(/\D/g,''))}
                autoFocus style={{textAlign:'center',fontSize:28,letterSpacing:10,fontFamily:'var(--mono)'}} />
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} type="button"
                onClick={()=>{setStep('token');setToken('');setTotpInput('');}}>← Назад</button>
              <button className="btn btn-primary" style={{flex:1.5,justifyContent:'center'}} type="submit"
                disabled={loading||totpInput.length!==6}>
                {loading?<span className="spinner spinner-sm"/>:'✓ Подтвердить'}
              </button>
            </div>
          </form>
        )}
      </div>
    </div>
  );
}

function Dashboard({ nodes, onSelectNode }) {
  const [status, setStatus] = useState([]);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);

  const loadStatus = useCallback(async (silent=false) => {
    if (silent) setRefreshing(true); else setLoading(true);
    try { const s = await api('GET', '/api/status'); setStatus(s); }
    catch {} finally { setLoading(false); setRefreshing(false); }
  }, []);

  useEffect(() => {
    loadStatus();
    const t = setInterval(() => loadStatus(true), 15000);
    return () => clearInterval(t);
  }, []);

  const totalUsers = useMemo(() => nodes.reduce((a,n) => a+(n._userCount||0),0), [nodes]);
  const onlineNodes = useMemo(() => status.filter(s=>s.online).length, [status]);
  const totalContainers = useMemo(() => status.reduce((a,s) => a+(s.containers||0),0), [status]);

  return (
    <div className="page-enter">
      <div className="page-header">

function NodesPage({ nodes, onReload, onManage }) {
  const [modal, setModal] = useState(false);
  const [editNode, setEditNode] = useState(null);
  const [checkStatus, setCheckStatus] = useState({});

  const checkNode = async (node) => {
    setCheckStatus(s=>({...s,[node.id]:'checking'}));
    try { const r = await api('GET',`/api/nodes/${node.id}/check`); setCheckStatus(s=>({...s,[node.id]:r.online?'online':'offline'})); }
    catch { setCheckStatus(s=>({...s,[node.id]:'offline'})); }
  };

  const deleteNode = async (node) => {
    if (!confirm(`Удалить ноду ${node.name}?`)) return;
    try { await api('DELETE',`/api/nodes/${node.id}`); toast('Нода удалена','success'); onReload(); }
    catch(e) { toast(e.message,'error'); }
  };

  return (
    <div className="page-enter">
      <div className="page-header">
        <div className="page-title">🖥️ <span>Ноды</span></div>
        <button className="btn btn-primary" onClick={()=>{setEditNode(null);setModal(true);}}>➕ Добавить ноду</button>
      </div>
      {nodes.length===0 ? <div className="card"><div className="empty"><div className="empty-icon">🖥️</div><div className="empty-text">Нет нод. Добавь первую!</div></div></div> : (
        <div className="grid-2">
          {nodes.map(node => {
            const cs = checkStatus[node.id];
            return (
              <div className="node-card" key={node.id}>
                <div className="node-header">
                  <div><div className="node-name">{node.name}</div><div className="node-host">{node.host}</div></div>
                  {cs && <span className={`badge ${cs==='checking'?'badge-yellow':cs==='online'?'badge-green':'badge-red'}`}>
                    {cs==='checking'?<span className="spinner spinner-sm"/>:<span className={`dot ${cs==='online'?'dot-pulse':''}`}/>}
                    {cs==='checking'?'проверка...':cs}
                  </span>}
                </div>
                <div style={{fontSize:11,color:'var(--t3)',fontFamily:'var(--mono)',marginBottom:12}}>
                  SSH {node.ssh_user}@{node.host}:{node.ssh_port} · порт от {node.start_port}
                </div>
                <div className="node-actions">
                  <button className="btn btn-primary btn-sm" onClick={()=>onManage(node)}>👥 Юзеры</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>checkNode(node)}>🔌 Проверить</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>{setEditNode(node);setModal(true);}}>✏️</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>deleteNode(node)}>🗑</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {modal && <NodeModal node={editNode} onClose={()=>setModal(false)} onSave={()=>{setModal(false);onReload();}} />}
    </div>
  );
}

function ConnectionsChart({ nodeId, userName }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api('GET',`/api/nodes/${nodeId}/users/${userName}/history`).then(data => {
      setLoading(false);
      if (!canvasRef.current) return;
      if (chartRef.current) chartRef.current.destroy();
      const labels = data.map(d => {
        const t = new Date(d.recorded_at);
        return t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
      });
      chartRef.current = new Chart(canvasRef.current, {
        type:'line',
        data:{ labels, datasets:[{ label:'Подключений', data:data.map(d=>d.connections),
          borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,0.08)',
          tension:0.45, fill:true, pointRadius:3, pointBackgroundColor:'#22d3ee', borderWidth:2 }] },
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false} },
          scales:{
            x:{ ticks:{color:'#3e4460',maxTicksLimit:8,font:{size:10}}, grid:{color:'rgba(255,255,255,0.03)'} },
            y:{ ticks:{color:'#3e4460',font:{size:10}}, grid:{color:'rgba(255,255,255,0.03)'}, beginAtZero:true, precision:0 }
          }
        }
      });
    }).catch(()=>setLoading(false));
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [nodeId, userName]);

  return (
    <div style={{height:160,position:'relative'}}>
      {loading && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t3)',fontSize:13,gap:8}}><span className="spinner"/>Загружаю...</div>}
      <canvas ref={canvasRef} style={{display:loading?'none':'block'}}/>
    </div>
  );
}

function UsersPage({ node, onBack }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [modal, setModal] = useState(false);
  const [busy, setBusy] = useState({});
  const [editUser, setEditUser] = useState(null);
  const [chartUser, setChartUser] = useState(null);
  const [qrUser, setQrUser] = useState(null);
  const [traffic, setTraffic] = useState({});

  const loadUsers = useCallback(async (silent=false) => {
    if (silent) setRefreshing(true); else setLoading(true);
    try { const u = await api('GET',`/api/nodes/${node.id}/users`); setUsers(u); }
    finally { setLoading(false); setRefreshing(false); }
  }, [node.id]);

  const loadTraffic = useCallback(async () => {
    try { const t = await api('GET',`/api/nodes/${node.id}/traffic`); setTraffic(t||{}); } catch {}
  }, [node.id]);

  const syncUsers = async () => {
    try {
      const r = await api('POST',`/api/nodes/${node.id}/sync`);
      toast(`Синхронизировано: ${r.imported} новых из ${r.total}`,r.imported>0?'success':'info');
      loadUsers(true);
    } catch(e) { toast(e.message,'error'); }
  };

  useEffect(() => { loadUsers(); loadTraffic(); }, [loadUsers, loadTraffic]);
  useEffect(() => { const t = setInterval(()=>loadTraffic(),30000); return ()=>clearInterval(t); }, [loadTraffic]);

  const setBusyFor = (name,val) => setBusy(b=>({...b,[name]:val}));

  const removeUser = async (user) => {
    if (!confirm(`Удалить ${user.name}?`)) return;
    setBusyFor(user.name,true);
    try { await api('DELETE',`/api/nodes/${node.id}/users/${user.name}`); toast(`${user.name} удалён`,'success'); loadUsers(true); }
    catch(e) { toast(e.message,'error'); }
    finally { setBusyFor(user.name,false); }
  };

  const toggleUser = async (user) => {
    const action = user.running?'stop':'start';
    // Optimistic update
    setUsers(prev=>prev.map(u=>u.name===user.name?{...u,running:!user.running}:u));
    setBusyFor(user.name,true);
    try {
      await api('POST',`/api/nodes/${node.id}/users/${user.name}/${action}`);
      toast(`${user.name} ${action==='stop'?'остановлен':'запущен'}`,'success');
    } catch(e) {
      setUsers(prev=>prev.map(u=>u.name===user.name?{...u,running:user.running}:u));
      toast(e.message,'error');
    }
    finally { setBusyFor(user.name,false); }
  };

  const formatExpiry = (expires_at) => {
    if (!expires_at) return null;
    const d = new Date(expires_at), diff = d - new Date();
    if (diff<0) return <span style={{color:'var(--red)',fontSize:11,fontWeight:500}}>истёк</span>;
    const days = Math.floor(diff/86400000);
    if (days<1) return <span style={{color:'var(--yellow)',fontSize:11}}>{'<'}1д</span>;
    return <span style={{color:'var(--t2)',fontSize:11}}>{days}д</span>;
  };

  return (
    <div className="page-enter">
      <div className="page-header">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Назад</button>
          <div>
            <div className="page-title">👥 <span>{node.name}</span></div>
            <div className="page-subtitle">{node.host}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {refreshing && <span className="refreshing-badge"><span className="spinner spinner-sm"/> обновление</span>}
          <button className="btn btn-ghost btn-sm" onClick={()=>loadUsers(true)}>↻ Обновить</button>
          <button className="btn btn-ghost btn-sm" onClick={syncUsers}>🔄 Синхронизировать</button>
          <button className="btn btn-primary" onClick={()=>setModal(true)}>+ Добавить</button>
        </div>
      </div>

      {chartUser && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontWeight:600,fontSize:14}}>📈 Подключения — {chartUser}</div>
            <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>setChartUser(null)}>✕</button>
          </div>
          <ConnectionsChart nodeId={node.id} userName={chartUser} />
        </div>
      )}

      <div className="card">
        {loading ? (
          <div className="loading-row"><span className="spinner"/>Загружаю...</div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Юзер</th><th>Порт</th><th>Подкл.</th><th>Трафик ↓/↑</th><th>Статус</th>
                <th>Истекает</th><th>Лимит</th><th>Заметка</th><th>Ссылка</th><th>Действия</th>
              </tr></thead>
              <tbody>
                {users.map(user => (
                  <tr key={user.id} style={{opacity:user.expired?.55:1,transition:'opacity .2s'}}>
                    <td><span style={{fontFamily:'var(--mono)',fontWeight:600,fontSize:13}}>{user.name}</span></td>
                    <td><span className="badge badge-cyan">{user.port}</span></td>
                    <td>
                      <span style={{fontFamily:'var(--mono)',fontSize:13,cursor:'pointer',color:'var(--p1)',fontWeight:500}}
                        onClick={()=>setChartUser(chartUser===user.name?null:user.name)} title="График">
                        {user.connections} <span style={{fontSize:10}}>📈</span>
                      </span>
                    </td>
                    <td>
                      {traffic[user.name]?(
                        <span className="tx-rx">
                          <span className="rx">↓{traffic[user.name].rx}</span>{' '}
                          <span className="tx">↑{traffic[user.name].tx}</span>
                        </span>
                      ):<span style={{color:'var(--t3)'}}>—</span>}
                    </td>
                    <td>
                      <span className={`badge ${user.running?'badge-green':'badge-red'}`}>
                        <span className={`dot ${user.running?'dot-pulse':''}`}/>{user.running?'работает':'стоп'}
                      </span>
                    </td>
                    <td>{formatExpiry(user.expires_at)||<span style={{color:'var(--t3)',fontSize:11}}>∞</span>}</td>
                    <td style={{fontSize:11,color:'var(--t2)'}}>{user.traffic_limit_gb?`${user.traffic_limit_gb} ГБ`:'∞'}</td>
                    <td style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:'var(--t2)'}} title={user.note}>{user.note||'—'}</td>
                    <td>
                      <div className="link-box" onClick={()=>copyText(user.link)} title={user.link}>
                        <span style={{fontSize:10}}>📋</span>
                        <span className="link-text">{user.link}</span>
                      </div>
                    </td>
                    <td>
                      <div className="actions-row">
                        <button className={`btn btn-sm ${user.running?'btn-ghost':'btn-primary'}`}
                          onClick={()=>toggleUser(user)} disabled={busy[user.name]} title={user.running?'Остановить':'Запустить'}>
                          {busy[user.name]?<span className="spinner spinner-sm"/>:(user.running?'⏸':'▶')}
                        </button>
                        <button className="btn btn-ghost btn-sm" onClick={()=>setEditUser(user)} title="Редактировать">✏️</button>
                        <button className="btn btn-ghost btn-sm" onClick={()=>setQrUser(user)} title="QR-код">📱</button>
                        <button className="btn btn-danger btn-sm" onClick={()=>removeUser(user)} disabled={busy[user.name]} title="Удалить">🗑</button>
                      </div>
                    </td>
                  </tr>
                ))}
                {users.length===0 && <tr><td colSpan={10}><div className="empty"><div className="empty-icon">👤</div><div className="empty-text">Нет юзеров. Добавь первого!</div></div></td></tr>}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {modal && <AddUserModal nodeId={node.id} onClose={()=>setModal(false)} onSave={()=>{setModal(false);loadUsers(true);}} />}
      {qrUser && <QRModal user={qrUser} node={node} onClose={()=>setQrUser(null)} />}
      {editUser && <EditUserModal user={editUser} nodeId={node.id} onClose={()=>setEditUser(null)} onSave={()=>{setEditUser(null);loadUsers(true);}} />}
    </div>
  );
}

function AllUsersPage({ nodes, onSelectNode }) {
  const [allUsers, setAllUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);

  const loadAll = useCallback(async (silent=false) => {
    if (silent) setRefreshing(true); else setLoading(true);
    try {
      const results = await Promise.all(nodes.map(async node => {
        try { const users = await api('GET',`/api/nodes/${node.id}/users`); return users.map(u=>({...u,nodeName:node.name,node})); }
        catch { return []; }
      }));
      setAllUsers(results.flat());
    } finally { setLoading(false); setRefreshing(false); }
  }, [nodes]);

  useEffect(()=>{loadAll();},[loadAll]);

  return (
    <div className="page-enter">
      <div className="page-header">
        <div className="page-title">👥 <span>Все юзеры</span></div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {refreshing && <span className="refreshing-badge"><span className="spinner spinner-sm"/></span>}
          <button className="btn btn-ghost btn-sm" onClick={()=>loadAll(true)}>↻ Обновить</button>
        </div>
      </div>
      <div className="card">
        {loading ? <div className="loading-row"><span className="spinner"/>Загружаю...</div> : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Юзер</th><th>Нода</th><th>Порт</th><th>Подкл.</th><th>Статус</th><th>Ссылка</th><th></th></tr></thead>
              <tbody>
                {allUsers.map(user => (
                  <tr key={user.id}>
                    <td><span style={{fontFamily:'var(--mono)',fontWeight:600}}>{user.name}</span></td>
                    <td><span className="badge badge-cyan" style={{cursor:'pointer'}} onClick={()=>onSelectNode(user.node)}>{user.nodeName}</span></td>
                    <td><span className="badge badge-cyan">{user.port}</span></td>
                    <td><span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--p1)'}}>{user.connections}</span></td>
                    <td><span className={`badge ${user.running?'badge-green':'badge-red'}`}><span className={`dot ${user.running?'dot-pulse':''}`}/>{user.running?'работает':'стоп'}</span></td>
                    <td><div className="link-box" onClick={()=>copyText(user.link)} title={user.link}><span style={{fontSize:10}}>📋</span><span className="link-text">{user.link}</span></div></td>
                    <td><button className="btn btn-ghost btn-sm" onClick={()=>onSelectNode(user.node)}>Управление →</button></td>
                  </tr>
                ))}
                {allUsers.length===0 && <tr><td colSpan={7}><div className="empty"><div className="empty-icon">👤</div><div className="empty-text">Нет юзеров</div></div></td></tr>}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

function SettingsPage() {
  const [totpEnabled, setTotpEnabled] = useState(false);
  const [setupData, setSetupData] = useState(null);
  const [verifyCode, setVerifyCode] = useState('');
  const [disableCode, setDisableCode] = useState('');
  const [loading, setLoading] = useState(false);
  const [step, setStep] = useState('idle');

  useEffect(()=>{api('GET','/api/totp/status').then(r=>setTotpEnabled(r.enabled)).catch(()=>{});},[]);

  const startSetup = async () => {
    setLoading(true);
    try { const data = await api('POST','/api/totp/setup'); setSetupData(data); setStep('setup'); }
    catch(e) { toast(e.message,'error'); } finally { setLoading(false); }
  };

  const confirmEnable = async () => {
    if (verifyCode.length!==6) return;
    setLoading(true);
    try {
      await api('POST','/api/totp/verify',{code:verifyCode});
      toast('2FA включена! ✅','success');
      setTotpEnabled(true); setStep('idle'); setSetupData(null); setVerifyCode('');
    } catch { toast('Неверный код','error'); } finally { setLoading(false); }
  };

  const confirmDisable = async () => {
    if (disableCode.length!==6) return;
    setLoading(true);
    try {
      await api('POST','/api/totp/disable',{code:disableCode});
      toast('2FA отключена','success');
      setTotpEnabled(false); setStep('idle'); setDisableCode(''); setTotpCode('');
    } catch { toast('Неверный код','error'); } finally { setLoading(false); }
  };

  return (
    <div className="page-enter">
      <div className="page-header"><div className="page-title">⚙️ <span>Настройки</span></div></div>
      <div className="card" style={{maxWidth:520}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>
          <div>
            <div style={{fontWeight:600,fontSize:15,marginBottom:4}}>🔐 Двухфакторная аутентификация</div>
            <div style={{fontSize:12,color:'var(--t3)'}}>Google Authenticator / любое TOTP приложение</div>
          </div>
          <span className={`badge ${totpEnabled?'badge-green':'badge-red'}`}>
            <span className={`dot ${totpEnabled?'dot-pulse':''}`}/>{totpEnabled?'включена':'выключена'}
          </span>
        </div>

        {step==='idle' && (!totpEnabled ? (
          <button className="btn btn-primary" onClick={startSetup} disabled={loading}>
            {loading?<span className="spinner spinner-sm"/>:'+ Включить 2FA'}
          </button>
        ) : (
          <button className="btn btn-danger" onClick={()=>setStep('disable')}>Отключить 2FA</button>
        ))}

        {step==='setup' && setupData && (
          <div>
            <div style={{fontSize:12,color:'var(--t2)',marginBottom:16,lineHeight:1.8,background:'var(--bg3)',padding:'12px 14px',borderRadius:9,border:'1px solid var(--border)'}}>
              1. Открой Google Authenticator<br/>
              2. Нажми "+" → "Сканировать QR-код"<br/>
              3. Введи 6-значный код для подтверждения
            </div>
            <div style={{textAlign:'center',marginBottom:16}}>
              <div style={{display:'inline-block',padding:14,background:'#fff',borderRadius:14}}
                ref={el=>{if(el&&el.children.length===0&&typeof QRCode!=='undefined'){new QRCode(el,{text:setupData.qr,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});}}} />
            </div>
            <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:9,padding:'10px 14px',marginBottom:16,fontFamily:'var(--mono)',fontSize:12,color:'var(--p2)',wordBreak:'break-all',textAlign:'center'}}>
              <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>Секрет (если QR не работает):</div>
              {setupData.secret}
            </div>
            <div className="form-group"><label className="form-label">Код подтверждения</label>
              <input className="form-input" type="text" inputMode="numeric" pattern="[0-9]*"
                placeholder="000000" value={verifyCode} maxLength={6}
                onChange={e=>setVerifyCode(e.target.value.replace(/\D/g,''))}
                style={{textAlign:'center',fontSize:24,letterSpacing:8,fontFamily:'var(--mono)'}} autoFocus /></div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={()=>{setStep('idle');setSetupData(null);}}>Отмена</button>
              <button className="btn btn-primary" onClick={confirmEnable}
                disabled={loading||verifyCode.length!==6} style={{flex:1,justifyContent:'center'}}>
                {loading?<span className="spinner spinner-sm"/>:'✅ Подтвердить и включить'}
              </button>
            </div>
          </div>
        )}

        {step==='disable' && (
          <div>
            <div style={{fontSize:12,color:'var(--t2)',marginBottom:16,background:'var(--bg3)',padding:'10px 14px',borderRadius:9,border:'1px solid var(--border)'}}>
              Введи текущий код из приложения для отключения 2FA
            </div>
            <div className="form-group"><label className="form-label">Код из приложения</label>
              <input className="form-input" type="text" inputMode="numeric" pattern="[0-9]*"
                placeholder="000000" value={disableCode} maxLength={6}
                onChange={e=>setDisableCode(e.target.value.replace(/\D/g,''))}
                style={{textAlign:'center',fontSize:24,letterSpacing:8,fontFamily:'var(--mono)'}} autoFocus /></div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={()=>setStep('idle')}>Отмена</button>
              <button className="btn btn-danger" onClick={confirmDisable}
                disabled={loading||disableCode.length!==6} style={{flex:1,justifyContent:'center'}}>
                {loading?<span className="spinner spinner-sm"/>:'Отключить 2FA'}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Toasts({ toasts }) {
  return <div className="toast-container">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</div>;
}

function App() {
  const [authed, setAuthed] = useState(!!getToken());
  const [page, setPage] = useState('dashboard');
  const [nodes, setNodes] = useState([]);
  const [selectedNode, setSelectedNode] = useState(null);
  const toasts = useToast();

  const loadNodes = useCallback(async () => {
    try { const n = await api('GET','/api/nodes'); setNodes(n||[]); } catch {}
  }, []);

  const loadUserCounts = useCallback(async (nodeList) => {
    try {
      const withCounts = await Promise.all(nodeList.map(async node => {
        try { const users = await api('GET',`/api/nodes/${node.id}/users`); return {...node,_userCount:users.length}; }
        catch { return {...node,_userCount:0}; }
      }));
      setNodes(withCounts);
    } catch {}
  }, []);

  useEffect(()=>{if(authed)loadNodes();},[authed]);
  useEffect(()=>{if(nodes.length>0&&!nodes[0]._userCount)loadUserCounts(nodes);},[nodes]);

  const onLogin = (token) => { setToken(token); setAuthed(true); };
  const selectNode = (node) => { setSelectedNode(node); setPage('users'); };

  if (!authed) return <><Login onLogin={onLogin}/><Toasts toasts={toasts}/></>;

  const navItems = [
    {id:'dashboard',icon:'📊',label:'Дашборд'},
    {id:'nodes',icon:'🖥️',label:'Ноды'},
    {id:'users',icon:'👥',label:'Юзеры'},
    {id:'settings',icon:'⚙️',label:'Настройки'},
  ];

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">⚡</div>
          <div className="logo-text">MTG Panel</div>
          <div className="logo-sub">MTG AdminPanel</div>
        </div>
        <nav className="nav">
          {navItems.map(item => (
            <div key={item.id}
              className={`nav-item ${page===item.id?'active':''}`}
              onClick={()=>{setPage(item.id);if(item.id!=='users')setSelectedNode(null);}}>
              <span className="nav-icon">{item.icon}</span>{item.label}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="sidebar-info">Ноды: {nodes.length}</div>
          <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center'}}
            onClick={()=>{setToken('');setAuthed(false);}}>Выйти</button>
        </div>
      </aside>

      <main className="main">
        {page==='dashboard' && <Dashboard nodes={nodes} onSelectNode={selectNode}/>}
        {page==='nodes' && <NodesPage nodes={nodes} onReload={loadNodes} onManage={selectNode}/>}
        {page==='users' && !selectedNode && <AllUsersPage nodes={nodes} onSelectNode={selectNode}/>}
        {page==='users' && selectedNode && <UsersPage node={selectedNode} onBack={()=>{setSelectedNode(null);setPage('users');}}/>}
        {page==='settings' && <SettingsPage/>}
      </main>

      <nav className="mobile-nav">
        {navItems.map(item => (
          <div key={item.id} className={`mobile-nav-item ${page===item.id?'active':''}`} onClick={()=>setPage(item.id)}>
            <span className="mnav-icon">{item.icon}</span>
            <span className="mnav-label">{item.label}</span>
          </div>
        ))}
      </nav>

      <Toasts toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
