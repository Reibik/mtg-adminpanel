<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG AdminPanel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --bg2: #0f1525;
    --bg3: #141928;
    --surface: #1a2035;
    --surface2: #1f2640;
    --border: #2a3450;
    --border2: #334060;
    --cyan: #00e5ff;
    --cyan2: #00b8d4;
    --green: #00e676;
    --red: #ff1744;
    --yellow: #ffd740;
    --text: #e8eaf0;
    --text2: #8892a8;
    --text3: #4a5568;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
  }

  .sidebar-logo {
    padding: 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .logo-text {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .sidebar-logo .logo-sub {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
    font-family: var(--mono);
  }

  .nav { flex: 1; padding: 12px 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: all 0.15s;
    margin-bottom: 2px;
    user-select: none;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: rgba(0,229,255,0.1); color: var(--cyan); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

  .main { margin-left: 220px; flex: 1; padding: 24px; max-width: calc(100vw - 220px); }

  /* ── Header ── */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .page-title { font-size: 20px; font-weight: 600; }
  .page-title span { color: var(--cyan); }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  @media (max-width: 1100px) { .grid-4 { grid-template-columns: repeat(2,1fr); } }

  /* ══ MOBILE ══════════════════════════════════════════════ */
  @media (max-width: 768px) {
    .sidebar {
      display: none;
    }
    .main {
      margin-left: 0;
      max-width: 100vw;
      padding: 16px 12px 80px 12px;
    }
    .mobile-nav {
      display: flex !important;
    }
    .grid-4 { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-2 { grid-template-columns: 1fr; gap: 10px; }
    .page-header {
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    .page-header > div:first-child { flex: 1; }
    .page-header > div:last-child { width: 100%; display: flex; justify-content: flex-end; }
    .stat-value { font-size: 22px; }
    .card { padding: 14px; }
    .modal {
      border-radius: 16px 16px 0 0 !important;
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      max-width: 100% !important;
      max-height: 85vh !important;
      margin: 0 !important;
    }
    .modal-overlay { align-items: flex-end !important; }
    table { font-size: 12px; }
    th, td { padding: 8px 10px; }
    .link-box { max-width: 160px; }
    .actions-row { flex-wrap: wrap; gap: 4px; }
    .node-card { padding: 14px; }
    .section-title { font-size: 13px; margin: 16px 0 10px; }
  }

  /* ── Mobile bottom nav ── */
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    z-index: 200;
    align-items: stretch;
  }
  .mobile-nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    font-size: 10px;
    color: var(--text3);
    transition: color 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .mobile-nav-item.active { color: var(--cyan); }
  .mobile-nav-item .mnav-icon { font-size: 20px; line-height: 1; }
  .mobile-nav-item .mnav-label { font-size: 10px; font-weight: 500; }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); }
  .stat-value.cyan { color: var(--cyan); }
  .stat-value.green { color: var(--green); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.red { color: var(--red); }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 14px;
    color: var(--text3); font-weight: 500;
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* ── Badges ── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 500; font-family: var(--mono);
  }
  .badge-green { background: rgba(0,230,118,0.12); color: var(--green); }
  .badge-red { background: rgba(255,23,68,0.12); color: var(--red); }
  .badge-yellow { background: rgba(255,215,64,0.12); color: var(--yellow); }
  .badge-cyan { background: rgba(0,229,255,0.12); color: var(--cyan); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px; border: none;
    cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.15s; font-family: var(--sans);
  }
  .btn-primary { background: var(--cyan); color: #000; }
  .btn-primary:hover { background: var(--cyan2); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(255,23,68,0.3); }
  .btn-danger:hover { background: rgba(255,23,68,0.1); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Inputs ── */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .form-input {
    width: 100%; padding: 9px 12px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text); font-size: 13px;
    font-family: var(--sans); outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--cyan); }
  .form-input::placeholder { color: var(--text3); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px;
    width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ── Link box ── */
  .link-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    font-family: var(--mono); font-size: 11px; color: var(--cyan);
    cursor: pointer; transition: border-color 0.15s;
    max-width: 320px; overflow: hidden;
  }
  .link-box:hover { border-color: var(--cyan); }
  .link-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  /* ── Node card ── */
  .node-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
    transition: border-color 0.2s;
  }
  .node-card:hover { border-color: var(--border2); }
  .node-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .node-name { font-size: 15px; font-weight: 600; }
  .node-host { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
  .node-stats { display: flex; gap: 20px; margin: 12px 0; }
  .node-stat { }
  .node-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .node-stat-value { font-size: 20px; font-weight: 700; font-family: var(--mono); color: var(--cyan); }
  .node-actions { display: flex; gap: 8px; margin-top: 14px; }

  /* ── Toast ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 10px; padding: 12px 16px;
    font-size: 13px; min-width: 220px;
    animation: slideIn 0.2s ease;
  }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--cyan); }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* ── Loading ── */
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border2);
    border-top-color: var(--cyan); border-radius: 50%;
    animation: spin 0.6s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay {
    display: flex; align-items: center; justify-content: center;
    padding: 40px; gap: 12px; color: var(--text2); font-size: 13px;
  }

  /* ── Actions row ── */
  .actions-row { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── Section title ── */
  .section-title {
    font-size: 13px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Auth token ────────────────────────────────────────────
const getToken = () => localStorage.getItem('mtg_token') || '';
const setToken = (t) => localStorage.setItem('mtg_token', t);

// ── API ───────────────────────────────────────────────────
const getTotpCode = () => sessionStorage.getItem('mtg_totp') || '';
const setTotpCode = (c) => { if (c) sessionStorage.setItem('mtg_totp', c); else sessionStorage.removeItem('mtg_totp'); };

const api = async (method, path, body) => {
  const headers = {
    'Content-Type': 'application/json',
    'x-auth-token': getToken(),
  };
  const totp = getTotpCode();
  if (totp) headers['x-totp-code'] = totp;

  const r = await fetch(path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status === 401) {
    setToken('');
    throw new Error('Unauthorized');
  }
  if (r.status === 403) {
    const data = await r.json().catch(() => ({}));
    if (data.totp) throw new Error('TOTP_REQUIRED');
    throw new Error(data.error || 'Forbidden');
  }
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'API error');
  return data;
};

// ── Toast ─────────────────────────────────────────────────
let toastCb = null;
function useToast() {
  const [toasts, setToasts] = useState([]);
  toastCb = (msg, type='info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  };
  return toasts;
}
const toast = (msg, type) => toastCb && toastCb(msg, type);

// ── Copy ──────────────────────────────────────────────────
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Скопировано!', 'success'));
}

// ── Login ─────────────────────────────────────────────────
function Login({ onLogin }) {
  const [token, setToken_] = useState('');
  const [step, setStep] = useState('token'); // 'token' | 'totp'
  const [totpInput, setTotpInput] = useState('');
  const [loading, setLoading] = useState(false);

  const submitToken = async (e) => {
    e.preventDefault();
    if (!token.trim()) return;
    setLoading(true);
    try {
      setToken(token);
      // Проверяем включена ли 2FA
      const status = await fetch('/api/totp/status', {
        headers: { 'x-auth-token': token }
      }).then(r => r.json());
      if (status.enabled) {
        setStep('totp');
      } else {
        await api('GET', '/api/nodes', null);
        toast('Подключено!', 'success');
        onLogin(token);
      }
    } catch {
      setToken('');
      toast('Неверный токен', 'error');
    } finally { setLoading(false); }
  };

  const submitTotp = async (e) => {
    e.preventDefault();
    if (totpInput.length !== 6) return;
    setLoading(true);
    try {
      setTotpCode(totpInput);
      await api('GET', '/api/nodes', null);
      toast('Подключено!', 'success');
      onLogin(token);
    } catch(err) {
      setTotpCode('');
      setTotpInput('');
      toast('Неверный код 2FA', 'error');
    } finally { setLoading(false); }
  };

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:'16px'}}>
      <div className="modal" style={{maxWidth:360,width:'100%',position:'static',borderRadius:16,maxHeight:'none'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:32,marginBottom:8}}>{step === 'totp' ? '🔐' : '🔒'}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700,color:'var(--cyan)'}}>MTG PANEL</div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>
            {step === 'totp' ? 'Двухфакторная аутентификация' : 'MTG Proxy Manager'}
          </div>
        </div>

        {step === 'token' ? (
          <form onSubmit={submitToken}>
            <div className="form-group">
              <label className="form-label">Auth Token</label>
              <input className="form-input" type="password" placeholder="Введи токен..." value={token}
                onChange={e => setToken_(e.target.value)} autoFocus />
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} type="submit" disabled={loading}>
              {loading ? <span className="spinner" style={{width:14,height:14}}/> : 'Войти'}
            </button>
          </form>
        ) : (
          <form onSubmit={submitTotp}>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:16,textAlign:'center'}}>
              Введи код из приложения Google Authenticator
            </div>
            <div className="form-group">
              <label className="form-label">6-значный код</label>
              <input className="form-input" type="text" inputMode="numeric" pattern="[0-9]*"
                placeholder="000000" value={totpInput} maxLength={6}
                onChange={e => setTotpInput(e.target.value.replace(/\D/g,''))}
                autoFocus style={{textAlign:'center',fontSize:24,letterSpacing:8}} />
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} type="button"
                onClick={() => { setStep('token'); setToken(''); setTotpInput(''); }}>
                ← Назад
              </button>
              <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} type="submit" disabled={loading || totpInput.length !== 6}>
                {loading ? <span className="spinner" style={{width:14,height:14}}/> : 'Подтвердить'}
              </button>
            </div>
          </form>
        )}
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────
function Dashboard({ nodes, onSelectNode }) {
  const [status, setStatus] = useState([]);
  const [loading, setLoading] = useState(true);

  const loadStatus = useCallback(async () => {
    try {
      const s = await api('GET', '/api/status');
      setStatus(s);
    } finally { setLoading(false); }
  }, []);

  useEffect(() => { loadStatus(); const t = setInterval(loadStatus, 15000); return () => clearInterval(t); }, []);

  const totalUsers = nodes.reduce((a, n) => a + (n._userCount || 0), 0);
  const onlineNodes = status.filter(s => s.online).length;
  const totalContainers = status.reduce((a, s) => a + (s.containers || 0), 0);

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Панель управления</div>
        <button className="btn btn-ghost btn-sm" onClick={loadStatus}>↻ Обновить</button>
      </div>

      <div className="grid-4">
        <div className="stat-card">
          <div className="stat-label">Нод</div>
          <div className="stat-value cyan">{nodes.length}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Онлайн</div>
          <div className="stat-value green">{onlineNodes}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Юзеров (активных)</div>
          <div className="stat-value yellow">{totalContainers}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Юзеров</div>
          <div className="stat-value cyan">{totalUsers}</div>
        </div>
      </div>

      <div className="section-title">Ноды</div>

      {loading ? (
        <div className="loading-overlay"><div className="spinner"/> Загружаю статус...</div>
      ) : (
        <div className="grid-2">
          {nodes.map(node => {
            const s = status.find(x => x.id === node.id) || {};
            return (
              <div className="node-card" key={node.id} style={{cursor:'pointer'}} onClick={() => onSelectNode(node)}>
                <div className="node-header">
                  <div>
                    <div className="node-name">{node.name}</div>
                    <div className="node-host">{node.host}</div>
                  </div>
                  <span className={`badge ${s.online ? 'badge-green' : 'badge-red'}`}>
                    <span className="dot"/>
                    {s.online ? 'online' : 'offline'}
                  </span>
                </div>
                <div className="node-stats">
                  <div className="node-stat">
                    <div className="node-stat-label">Всего юзеров</div>
                    <div className="node-stat-value">{node._userCount || 0}</div>
                  </div>
                  <div className="node-stat">
                    <div className="node-stat-label">Активных</div>
                    <div className="node-stat-value">{s.containers || 0}</div>
                  </div>
                </div>
                <div className="node-actions">
                  <button className="btn btn-primary btn-sm" onClick={e => { e.stopPropagation(); onSelectNode(node); }}>
                    👥 Юзеры
                  </button>
                </div>
              </div>
            );
          })}
          {nodes.length === 0 && (
            <div style={{gridColumn:'1/-1'}}>
              <div className="empty">
                <div className="empty-icon">🖥️</div>
                <div className="empty-text">Нет нод. Добавь первую!</div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Node Modal ────────────────────────────────────────────
function NodeModal({ node, onClose, onSave }) {
  const [form, setForm] = useState(node || { name:'', host:'', ssh_user:'root', ssh_port:22, base_dir:'/opt/mtg/users', start_port:4433, ssh_password:'', ssh_key:'' });
  const [loading, setLoading] = useState(false);

// ── Nodes Page ────────────────────────────────────────────
function NodesPage({ nodes, onReload, onManage }) {
  const [modal, setModal] = useState(null);
  const [versions, setVersions] = useState({});
  const [updating, setUpdating] = useState({});

  const deleteNode = async (node) => {
    if (!confirm(`Удалить ноду "${node.name}"?`)) return;
    await api('DELETE', `/api/nodes/${node.id}`);
    toast('Нода удалена', 'success');
    onReload();
  };

  const checkNode = async (node) => {
    toast(`Проверяю ${node.name}...`, 'info');
    const r = await api('GET', `/api/nodes/${node.id}/check`);
    toast(r.online ? `${node.name}: онлайн ✅` : `${node.name}: недоступна ❌`, r.online ? 'success' : 'error');
  };

  const checkVersion = async (node) => {
    setVersions(v => ({...v, [node.id]: 'checking...'}));
    try {
      const r = await api('GET', `/api/nodes/${node.id}/mtg-version`);
      // Форматируем дату из "mtg:2 | built 2026-02-28T..."
      let version = r.version || 'unknown';
      const dateMatch = version.match(/(\d{4}-\d{2}-\d{2})/);
      if (dateMatch) version = 'обновлён ' + dateMatch[1];
      setVersions(v => ({...v, [node.id]: version}));
    } catch {
      setVersions(v => ({...v, [node.id]: 'error'}));
    }
  };

  const updateMtg = async (node) => {
    if (!confirm(`Обновить mtg на ${node.name}? Контейнеры перезапустятся.`)) return;
    setUpdating(u => ({...u, [node.id]: true}));
    try {
      const r = await api('POST', `/api/nodes/${node.id}/mtg-update`);
      toast(`${node.name}: mtg обновлён ✅`, 'success');
      checkVersion(node);
    } catch(e) {
      toast(`Ошибка обновления: ${e.message}`, 'error');
    } finally {
      setUpdating(u => ({...u, [node.id]: false}));
    }
  };

  return (
    <div>
      <div className="page-header">
        <div className="page-title">🖥️ <span>Ноды</span></div>
        <button className="btn btn-primary" onClick={() => setModal('new')}>+ Добавить ноду</button>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Название</th><th>Host / IP</th><th>SSH</th><th>Порты</th><th>Действия</th>
              </tr>
            </thead>
            <tbody>
              {nodes.map(node => (
                <tr key={node.id} style={{cursor:'pointer'}} onClick={() => onManage(node)}>
                  <td><b>{node.name}</b></td>
                  <td style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--cyan)'}}>{node.host}</td>
                  <td style={{fontSize:12}}>{node.ssh_user}:{node.ssh_port}</td>
                  <td style={{fontSize:12}}>{node.start_port}+</td>
                  <td>
                    <div className="actions-row" onClick={e => e.stopPropagation()}>
                      <button className="btn btn-ghost btn-sm" onClick={() => checkNode(node)}>Ping</button>
                      <button className="btn btn-ghost btn-sm" onClick={() => setModal(node)}>Ред.</button>
                      <button className="btn btn-danger btn-sm" onClick={() => deleteNode(node)}>Удалить</button>
                    </div>
                  </td>
                </tr>
              ))}
              {nodes.length === 0 && (
                <tr><td colSpan={6}><div className="empty"><div className="empty-icon">🖥️</div><div className="empty-text">Нет нод</div></div></td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      {modal && (
        <NodeModal
          node={modal === 'new' ? null : modal}
          onClose={() => setModal(null)}
          onSave={() => { setModal(null); onReload(); }}
        />
      )}
    </div>
  );
}

function QRModal({ user, node, onClose }) {
  const qrRef = React.useRef(null);

  React.useEffect(() => {
    if (!qrRef.current) return;
    qrRef.current.innerHTML = '';
    new QRCode(qrRef.current, {
      text: user.link,
      width: 220,
      height: 220,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  }, [user.link]);

  const copyLink = () => {
    navigator.clipboard.writeText(user.link).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const downloadQR = () => {
    const canvas = qrRef.current?.querySelector('canvas');

  return (

// ── Connections Chart ─────────────────────────────────────
function ConnectionsChart({ nodeId, userName }) {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api('GET', `/api/nodes/${nodeId}/users/${userName}/history`).then(data => {
      setLoading(false);
      if (!canvasRef.current) return;
      if (chartRef.current) chartRef.current.destroy();
      const labels = data.map(d => {
        const t = new Date(d.recorded_at);
        return t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
      });
      const values = data.map(d => d.connections);
      chartRef.current = new Chart(canvasRef.current, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Подключений',
            data: values,
            borderColor: '#00d4ff',
            backgroundColor: 'rgba(0,212,255,0.1)',
            tension: 0.4,
            fill: true,
            pointRadius: 3,
            pointBackgroundColor: '#00d4ff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#888', maxTicksLimit: 8 }, grid: { color: 'rgba(255,255,255,0.05)' } },
            y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true, precision: 0 }
          }
        }
      });
    }).catch(() => setLoading(false));
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [nodeId, userName]);

  return (
    <div style={{height:160,position:'relative'}}>
      {loading && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)'}}>Загрузка графика...</div>}
      <canvas ref={canvasRef} style={{display: loading ? 'none' : 'block'}}/>
    </div>
  );
}

// ── Users Page ────────────────────────────────────────────
function UsersPage({ node, onBack }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [busy, setBusy] = useState({});

  const loadUsers = useCallback(async () => {
    setLoading(true);
    try {
      const u = await api('GET', `/api/nodes/${node.id}/users`);
      setUsers(u);
    } finally { setLoading(false); }
  }, [node.id]);

  const setBusyFor = (name, val) => setBusy(b => ({...b, [name]: val}));
  const [editUser, setEditUser] = useState(null);
  const [chartUser, setChartUser] = useState(null);
  const [qrUser, setQrUser] = useState(null);
  const [traffic, setTraffic] = useState({});

  const loadTraffic = useCallback(async () => {
    try {
      const t = await api('GET', `/api/nodes/${node.id}/traffic`);
      setTraffic(t || {});
    } catch {}
  }, [node.id]);

  useEffect(() => { loadUsers(); loadTraffic(); }, [loadUsers, loadTraffic]);
  useEffect(() => {
    const t = setInterval(loadTraffic, 30000);
    return () => clearInterval(t);
  }, [loadTraffic]);

  const removeUser = async (user) => {
    if (!confirm(`Удалить ${user.name}?`)) return;
    setBusyFor(user.name, true);
    try {
      await api('DELETE', `/api/nodes/${node.id}/users/${user.name}`);
      toast(`${user.name} удалён`, 'success');
      loadUsers();
    } catch(e) { toast(e.message, 'error'); }
    finally { setBusyFor(user.name, false); }
  };

  const toggleUser = async (user) => {
    const action = user.running ? 'stop' : 'start';
    setBusyFor(user.name, true);
    try {
      await api('POST', `/api/nodes/${node.id}/users/${user.name}/${action}`);
      toast(`${user.name} ${action === 'stop' ? 'остановлен' : 'запущен'}`, 'success');
      loadUsers();
    } catch(e) { toast(e.message, 'error'); }
    finally { setBusyFor(user.name, false); }
  };

  const formatExpiry = (expires_at) => {
    if (!expires_at) return null;
    const d = new Date(expires_at);
    const now = new Date();
    const diff = d - now;
    if (diff < 0) return <span style={{color:'var(--red)',fontSize:11}}>истёк</span>;
    const days = Math.floor(diff / 86400000);
    if (days < 1) return <span style={{color:'var(--yellow)',fontSize:11}}>{'<'}1 дня</span>;
    return <span style={{color:'var(--text2)',fontSize:11}}>{days}д</span>;
  };

  return (
    <div>
      <div className="page-header">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Назад</button>
          <div>
            <div className="page-title">👥 <span>{node.name}</span></div>
            <div style={{fontSize:12,color:'var(--text3)',fontFamily:'var(--mono)'}}>{node.host}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={loadUsers}>↻ Обновить</button>
          <button className="btn btn-primary" onClick={() => setModal(true)}>+ Добавить юзера</button>
        </div>
      </div>

      {chartUser && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontWeight:600}}>📈 График подключений — {chartUser}</div>
            <button className="btn btn-ghost btn-sm" onClick={() => setChartUser(null)}>✕</button>
          </div>
          <ConnectionsChart nodeId={node.id} userName={chartUser} />
        </div>
      )}

      <div className="card">
        {loading ? (
          <div className="loading-overlay"><div className="spinner"/> Загружаю...</div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Юзер</th><th>Порт</th><th>Подкл.</th><th>Трафик ↓/↑</th><th>Статус</th><th>Истекает</th><th>Лимит</th><th>Заметка</th><th>Ссылка</th><th>Действия</th>
                </tr>
              </thead>
              <tbody>
                {users.map(user => (
                  <tr key={user.id} style={{opacity: user.expired ? 0.6 : 1}}>
                    <td>
                      <div style={{fontFamily:'var(--mono)',fontWeight:600}}>{user.name}</div>
                    </td>
                    <td><span className="badge badge-cyan">{user.port}</span></td>
                    <td>
                      <span
                        style={{fontFamily:'var(--mono)',fontSize:13,cursor:'pointer',color:'var(--cyan)'}}
                        onClick={() => setChartUser(chartUser === user.name ? null : user.name)}
                        title="Показать график"
                      >{user.connections} 📈</span>
                    </td>
                    <td style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--text2)',whiteSpace:'nowrap'}}>
                      {traffic[user.name] ? (
                        <span title="Входящий / Исходящий">
                          <span style={{color:'#4ade80'}}>↓{traffic[user.name].rx}</span>
                          {' '}
                          <span style={{color:'#f87171'}}>↑{traffic[user.name].tx}</span>
                        </span>
                      ) : '—'}
                    </td>
                    <td>
                      <span className={`badge ${user.running ? 'badge-green' : 'badge-red'}`}>
                        <span className="dot"/>
                        {user.running ? 'работает' : 'стоп'}
                      </span>
                    </td>
                    <td>{formatExpiry(user.expires_at) || <span style={{color:'var(--text3)',fontSize:11}}>∞</span>}</td>
                    <td style={{fontSize:11,color:'var(--text2)'}}>{user.traffic_limit_gb ? `${user.traffic_limit_gb} ГБ` : '∞'}</td>
                    <td style={{maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:'var(--text2)'}} title={user.note}>{user.note || '—'}</td>
                    <td>
                      <div className="link-box" onClick={() => copyText(user.link)} title={user.link}>
                        <span>📋</span>
                        <span className="link-text">{user.link}</span>
                      </div>
                    </td>
                    <td>
                      <div className="actions-row">
                        <button
                          className={`btn btn-sm ${user.running ? 'btn-ghost' : 'btn-primary'}`}
                          onClick={() => toggleUser(user)}
                          disabled={busy[user.name]}
                        >
                          {busy[user.name] ? <span className="spinner" style={{width:12,height:12}}/> : (user.running ? '⏸' : '▶')}
                        </button>
                        <button className="btn btn-ghost btn-sm" onClick={() => setEditUser(user)}>✏️</button>
                        <button className="btn btn-ghost btn-sm" onClick={() => setQrUser(user)} title="QR-код">📱</button>
                        <button
                          className="btn btn-danger btn-sm"
                          onClick={() => removeUser(user)}
                          disabled={busy[user.name]}
                        >🗑</button>
                      </div>
                    </td>
                  </tr>
                ))}
                {users.length === 0 && (
                  <tr><td colSpan={9}>
                    <div className="empty">
                      <div className="empty-icon">👤</div>
                      <div className="empty-text">Нет юзеров. Добавь первого!</div>
                    </div>
                  </td></tr>
                )}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {modal && (
        <AddUserModal
          nodeId={node.id}
          onClose={() => setModal(false)}
          onSave={() => { setModal(false); loadUsers(); }}
        />
      )}
      {qrUser && (
        <QRModal user={qrUser} node={node} onClose={() => setQrUser(null)} />
      )}
      {editUser && (
        <EditUserModal
          user={editUser}
          nodeId={node.id}
          onClose={() => setEditUser(null)}
          onSave={() => { setEditUser(null); loadUsers(); }}
        />
      )}
    </div>
  );
}

// ── All Users Page ────────────────────────────────────────
function AllUsersPage({ nodes, onSelectNode }) {
  const [allUsers, setAllUsers] = useState([]);
  const [loading, setLoading] = useState(true);

  const loadAll = useCallback(async () => {
    setLoading(true);
    try {
      const results = await Promise.all(nodes.map(async node => {
        try {
          const users = await api('GET', `/api/nodes/${node.id}/users`);
          return users.map(u => ({ ...u, nodeName: node.name, nodeHost: node.host, node }));
        } catch { return []; }
      }));
      setAllUsers(results.flat());
    } finally { setLoading(false); }
  }, [nodes]);

  useEffect(() => { loadAll(); }, [loadAll]);

  return (
    <div>
      <div className="page-header">
        <div className="page-title">👥 <span>Все юзеры</span></div>
        <button className="btn btn-ghost btn-sm" onClick={loadAll}>↻ Обновить</button>
      </div>
      <div className="card">
        {loading ? (
          <div className="loading-overlay"><div className="spinner"/> Загружаю...</div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Юзер</th><th>Нода</th><th>Порт</th><th>Подкл.</th><th>Статус</th><th>Ссылка</th><th>Действия</th>
                </tr>
              </thead>
              <tbody>
                {allUsers.map(user => (
                  <tr key={user.id}>
                    <td><b style={{fontFamily:'var(--mono)'}}>{user.name}</b></td>
                    <td>
                      <span className="badge badge-cyan" style={{cursor:'pointer'}} onClick={() => onSelectNode(user.node)}>
                        {user.nodeName}
                      </span>
                    </td>
                    <td><span className="badge badge-cyan">{user.port}</span></td>
                    <td><span style={{fontFamily:'var(--mono)',fontSize:13}}>{user.connections}</span></td>
                    <td>
                      <span className={`badge ${user.running ? 'badge-green' : 'badge-red'}`}>
                        <span className="dot"/>
                        {user.running ? 'работает' : 'стоп'}
                      </span>
                    </td>
                    <td>
                      <div className="link-box" onClick={() => copyText(user.link)} title={user.link}>
                        <span>📋</span>
                        <span className="link-text">{user.link}</span>
                      </div>
                    </td>
                    <td>
                      <button className="btn btn-ghost btn-sm" onClick={() => onSelectNode(user.node)}>
                        Управление
                      </button>
                    </td>
                  </tr>
                ))}
                {allUsers.length === 0 && (
                  <tr><td colSpan={7}>
                    <div className="empty">
                      <div className="empty-icon">👤</div>
                      <div className="empty-text">Нет юзеров</div>
                    </div>
                  </td></tr>
                )}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(!!getToken());
  const [page, setPage] = useState('dashboard');
  const [nodes, setNodes] = useState([]);
  const [selectedNode, setSelectedNode] = useState(null);
  const toasts = useToast();

  const loadNodes = useCallback(async () => {
    try {
      const n = await api('GET', '/api/nodes');
      setNodes(n || []);
    } catch {}
  }, []);

  const loadUserCounts = useCallback(async (nodeList) => {
    try {
      const withCounts = await Promise.all(nodeList.map(async node => {
        try {
          const users = await api('GET', `/api/nodes/${node.id}/users`);
          return { ...node, _userCount: users.length };
        } catch {
          return { ...node, _userCount: 0 };
        }
      }));
      setNodes(withCounts);
    } catch {}
  }, []);

  useEffect(() => { if (authed) loadNodes(); }, [authed]);
  useEffect(() => { if (nodes.length > 0 && !nodes[0]._userCount) loadUserCounts(nodes); }, [nodes]);

  const onLogin = (token) => { setToken(token); setAuthed(true); };

  const selectNode = (node) => { setSelectedNode(node); setPage('users'); };

  if (!authed) return (
    <>
      <Login onLogin={onLogin} />
      <Toasts toasts={toasts} />
    </>
  );

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-text">MTG Panel</div>
          <div className="logo-sub">MTG AdminPanel</div>
        </div>
        <nav className="nav">
          <div className={`nav-item ${page==='dashboard'?'active':''}`} onClick={() => setPage('dashboard')}>
            <span className="icon">📊</span> Дашборд
          </div>
          <div className={`nav-item ${page==='nodes'?'active':''}`} onClick={() => setPage('nodes')}>
            <span className="icon">🖥️</span> Ноды
          </div>
          <div className={`nav-item ${page==='users'?'active':''}`} onClick={() => setPage('users')}>
            <span className="icon">👥</span> Юзеры
          </div>
          <div className={`nav-item ${page==='settings'?'active':''}`} onClick={() => setPage('settings')}>
            <span className="icon">⚙️</span> Настройки
          </div>
        </nav>
        <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)'}}>
          <div style={{fontSize:11,color:'var(--text3)'}}>
            <div>Нод: {nodes.length}</div>
          </div>
          <button className="btn btn-ghost btn-sm" style={{marginTop:8,width:'100%',justifyContent:'center'}}
            onClick={() => { setToken(''); setAuthed(false); }}>
            Выйти
          </button>
        </div>
      </aside>

      <main className="main">
        {page === 'dashboard' && <Dashboard nodes={nodes} onSelectNode={(n) => selectNode(n)} />}
        {page === 'nodes' && <NodesPage nodes={nodes} onReload={loadNodes} onManage={selectNode} />}
        {page === 'users' && !selectedNode && <AllUsersPage nodes={nodes} onSelectNode={selectNode} />}
        {page === 'users' && selectedNode && <UsersPage node={selectedNode} onBack={() => { setSelectedNode(null); setPage('users'); }} />}
        {page === 'settings' && <SettingsPage />}
      </main>

      {/* ── Mobile bottom navigation ── */}
      <nav className="mobile-nav">
        <div className={`mobile-nav-item ${page==='dashboard'?'active':''}`} onClick={() => setPage('dashboard')}>
          <span className="mnav-icon">📊</span>
          <span className="mnav-label">Дашборд</span>
        </div>
        <div className={`mobile-nav-item ${page==='nodes'?'active':''}`} onClick={() => setPage('nodes')}>
          <span className="mnav-icon">🖥️</span>
          <span className="mnav-label">Ноды</span>
        </div>
        <div className={`mobile-nav-item ${page==='users'?'active':''}`} onClick={() => setPage('users')}>
          <span className="mnav-icon">👥</span>
          <span className="mnav-label">Юзеры</span>
        </div>
        <div className={`mobile-nav-item ${page==='settings'?'active':''}`} onClick={() => setPage('settings')}>
          <span className="mnav-icon">⚙️</span>
          <span className="mnav-label">Настройки</span>
        </div>
      </nav>

      <Toasts toasts={toasts} />
    </div>
  );
}

// ── Settings Page ─────────────────────────────────────────
function SettingsPage() {
  const [totpEnabled, setTotpEnabled] = useState(false);
  const [setupData, setSetupData] = useState(null); // { secret, qr }
  const [verifyCode, setVerifyCode] = useState('');
  const [disableCode, setDisableCode] = useState('');
  const [loading, setLoading] = useState(false);
  const [step, setStep] = useState('idle'); // 'idle' | 'setup' | 'disable'

  useEffect(() => {
    api('GET', '/api/totp/status').then(r => setTotpEnabled(r.enabled)).catch(() => {});
  }, []);

  const startSetup = async () => {
    setLoading(true);
    try {
      const data = await api('POST', '/api/totp/setup');
      setSetupData(data);
      setStep('setup');
    } catch(e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  };

  const confirmEnable = async () => {
    if (verifyCode.length !== 6) return;
    setLoading(true);
    try {
      await api('POST', '/api/totp/verify', { code: verifyCode });
      toast('2FA включена! ✅', 'success');
      setTotpEnabled(true);
      setStep('idle');
      setSetupData(null);
      setVerifyCode('');
    } catch(e) { toast('Неверный код', 'error'); }
    finally { setLoading(false); }
  };

  const confirmDisable = async () => {
    if (disableCode.length !== 6) return;
    setLoading(true);
    try {
      await api('POST', '/api/totp/disable', { code: disableCode });
      toast('2FA отключена', 'success');
      setTotpEnabled(false);
      setStep('idle');
      setDisableCode('');
      setTotpCode('');
    } catch(e) { toast('Неверный код', 'error'); }
    finally { setLoading(false); }
  };

  return (
    <div>
      <div className="page-header">
        <div className="page-title">⚙️ <span>Настройки</span></div>
      </div>

      {/* 2FA Card */}
      <div className="card" style={{maxWidth:500}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div>
            <div style={{fontWeight:600,fontSize:15}}>🔐 Двухфакторная аутентификация</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>Google Authenticator / любое TOTP приложение</div>
          </div>
          <span className={`badge ${totpEnabled ? 'badge-green' : 'badge-red'}`}>
            <span className="dot"/>
            {totpEnabled ? 'включена' : 'выключена'}
          </span>
        </div>

        {step === 'idle' && (
          !totpEnabled ? (
            <button className="btn btn-primary" onClick={startSetup} disabled={loading}>
              {loading ? <span className="spinner" style={{width:14,height:14}}/> : '+ Включить 2FA'}
            </button>
          ) : (
            <button className="btn btn-danger" onClick={() => setStep('disable')}>
              Отключить 2FA
            </button>
          )
        )}

        {step === 'setup' && setupData && (
          <div>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:16}}>
              1. Открой Google Authenticator<br/>
              2. Нажми "+" → "Сканировать QR-код"<br/>
              3. Введи 6-значный код для подтверждения
            </div>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div id="totp-qr-container" style={{display:"inline-block",padding:12,background:"#fff",borderRadius:12}}
                ref={el => { if (el && el.children.length === 0) { new QRCode(el, { text: setupData.qr, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.M }); } }}
              />
            </div>
            <div style={{
              background:'var(--bg3)',border:'1px solid var(--border)',
              borderRadius:8,padding:'8px 12px',marginBottom:16,
              fontFamily:'var(--mono)',fontSize:12,color:'var(--cyan)',
              wordBreak:'break-all',textAlign:'center'
            }}>
              <div style={{fontSize:10,color:'var(--text3)',marginBottom:4}}>Секрет (если QR не работает):</div>
              {setupData.secret}
            </div>
            <div className="form-group">
              <label className="form-label">Код подтверждения</label>
              <input className="form-input" type="text" inputMode="numeric" pattern="[0-9]*"
                placeholder="000000" value={verifyCode} maxLength={6}
                onChange={e => setVerifyCode(e.target.value.replace(/\D/g,''))}
                style={{textAlign:'center',fontSize:20,letterSpacing:6}} autoFocus />
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={() => { setStep('idle'); setSetupData(null); }}>Отмена</button>
              <button className="btn btn-primary" onClick={confirmEnable}
                disabled={loading || verifyCode.length !== 6} style={{flex:1,justifyContent:'center'}}>
                {loading ? <span className="spinner" style={{width:14,height:14}}/> : '✅ Подтвердить и включить'}
              </button>
            </div>
          </div>
        )}

        {step === 'disable' && (
          <div>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:16}}>
              Введи текущий код из приложения для отключения 2FA
            </div>
            <div className="form-group">
              <label className="form-label">Код из приложения</label>
              <input className="form-input" type="text" inputMode="numeric" pattern="[0-9]*"
                placeholder="000000" value={disableCode} maxLength={6}
                onChange={e => setDisableCode(e.target.value.replace(/\D/g,''))}
                style={{textAlign:'center',fontSize:20,letterSpacing:6}} autoFocus />
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={() => setStep('idle')}>Отмена</button>
              <button className="btn btn-danger" onClick={confirmDisable}
                disabled={loading || disableCode.length !== 6} style={{flex:1,justifyContent:'center'}}>
                {loading ? <span className="spinner" style={{width:14,height:14}}/> : 'Отключить 2FA'}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Toasts({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
